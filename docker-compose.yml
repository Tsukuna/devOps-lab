name: mern-app

services:
  mongo:
    image: mongodb/mongodb-community-server:latest
    container_name: mongo-db
    ports:
      - 27017:27017
    volumes:
      - mongo_data:/data/db
    networks:
      - mern-app
    

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend-api
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - 5000:5000
    networks:
      - mern-app
    depends_on:
      - mongo
  client:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend-ui
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
    ports:
      - 5173:5173
    networks:
      - mern-app
    depends_on:
      - api
    

volumes:
  mongo_data:
networks:
  mern-app:
    driver: bridge